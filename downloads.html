<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Downloads</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Premium Dark Theme UI */
        body { background: #07070F; color: #F0F0FF; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.07); padding-bottom: 15px; }
        .header h2 { margin: 0; font-size: 1.4rem; font-weight: 600; }
        .back-btn { color: white; text-decoration: none; font-size: 0.9rem; background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 50px; font-weight: 500; }
        
        /* Downloading Card UI (Progress bar ke liye) */
        .downloading-card { background: rgba(230, 57, 70, 0.1); border: 1px solid rgba(230, 57, 70, 0.3); border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .dl-info { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .dl-info h3 { margin: 0; font-size: 1rem; color: #fff; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid #E63946; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .progress-bar { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; width: 0%; background: #E63946; border-radius: 10px; transition: width 0.3s ease; }
        .status-text { margin: 0; font-size: 0.8rem; color: rgba(255,255,255,0.6); display: flex; justify-content: space-between; }

        /* Offline Grid UI (Download hui movies ke liye) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #181828; border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.07); }
        .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .card-body { padding: 10px; }
        .card-body h3 { font-size: 0.85rem; margin: 0 0 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .btn-group { display: flex; gap: 5px; }
        .btn { flex: 1; padding: 6px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.75rem; font-family: 'Poppins', sans-serif;}
        .btn-play { background: #E63946; color: white; }
        .btn-del { background: rgba(255,255,255,0.1); color: white; }
        .empty-msg { text-align: center; color: rgba(255,255,255,0.5); margin-top: 50px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <h2>Downloads</h2>
        <a href="index.html" class="back-btn">⬅ Back</a>
    </div>

    <!-- Yahan active download ka progress bar dikhega -->
    <div id="activeDownloadSection" class="downloading-card" style="display:none;">
        <div class="dl-info">
            <span class="spinner"></span>
            <h3 id="dlTitle">Preparing...</h3>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="dlProgress"></div>
        </div>
        <p class="status-text"><span id="dlStatusText">Connecting to server...</span> <span id="dlPercent">0%</span></p>
    </div>

    <!-- Yahan saari downloaded movies dikhengi -->
    <div id="downloadsGrid" class="grid"></div>

    <script>
        const WORKER_URL = "https://shy-heart-bf9d.ekgf2003.workers.dev/?url=";

        // 1. Grid Load Karne Ka Function 
        function loadDownloads() {
            const downloadsGrid = document.getElementById('downloadsGrid');
            const offlineMovies = JSON.parse(localStorage.getItem('my_downloads') || '[]');

            if (offlineMovies.length === 0) {
                downloadsGrid.innerHTML = "<div class='empty-msg'>No downloaded videos available.</div>";
                return;
            }
            downloadsGrid.innerHTML = '';
            
            offlineMovies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${movie.thumb || 'https://via.placeholder.com/300x169/181828/6E6E98?text=Offline'}" alt="Thumb"> 
                    <div class="card-body">
                        <h3>${movie.title}</h3>
                        <div class="btn-group">
                            <button class="btn btn-play" onclick="playOffline('${movie.url}')">▶ Play</button>
                            <button class="btn btn-del" onclick="deleteDownload('${movie.id}', '${movie.url}')">Delete</button>
                        </div>
                    </div>
                `;
                downloadsGrid.appendChild(card);
            });
        }

        // 2. Play Offline Video 
        function playOffline(videoUrl) {
            window.location.href = `index.html?offline_play=${encodeURIComponent(videoUrl)}`;
        }

        // 3. Delete Logic
        async function deleteDownload(movieId, videoUrl) {
            if(confirm("Remove this video from downloads?")) {
                try {
                    const cache = await caches.open('hotfake-cache-v2');
                    await cache.delete(videoUrl); 
                    
                    let offlineMovies = JSON.parse(localStorage.getItem('my_downloads') || '[]');
                    offlineMovies = offlineMovies.filter(m => m.id !== movieId);
                    localStorage.setItem('my_downloads', JSON.stringify(offlineMovies));
                    
                    loadDownloads(); 
                } catch (err) { console.error(err); }
            }
        }

        // 4. Background Fetch & Progress Bar Logic (UPDATED WITH ADVANCED ERROR TRACKING)
        async function processPendingDownload() {
            const pending = localStorage.getItem('pending_download');
            if (!pending) return; 
            
            const movie = JSON.parse(pending);
            localStorage.removeItem('pending_download'); 
            
            const uiSection = document.getElementById('activeDownloadSection');
            const uiTitle = document.getElementById('dlTitle');
            const uiStatus = document.getElementById('dlStatusText');
            const uiProgress = document.getElementById('dlProgress');
            const uiPercent = document.getElementById('dlPercent');

            // UI on karo 
            uiSection.style.display = 'block';
            uiTitle.innerText = movie.title;
            uiStatus.innerText = "Extracting video link...";
            uiStatus.style.color = "rgba(255,255,255,0.6)"; // Reset color incase of previous error
            
            try {
                // Step A: Worker se final MP4 link laao
                const res = await fetch(WORKER_URL + encodeURIComponent(movie.url));
                const data = await res.json();
                const directUrl = (data.direct_urls && data.direct_urls.length > 0) ? data.direct_urls[0] : data.direct_url;
                
                if(!directUrl) throw new Error("Link extract failed (Worker Error)");
                uiStatus.innerText = "Downloading safely...";

                // Step B: Direct URL se video fetch karo Cache ke liye
                const videoRes = await fetch(directUrl);
                
                // HINGLISH: Yahan hum check kar rahe hain ki server ne file dene se mana toh nahi kiya (CORS ya 403 Forbidden Error)
                if (!videoRes.ok) {
                    throw new Error(`Server Blocked (Status: ${videoRes.status})`);
                }

                const cache = await caches.open('hotfake-cache-v2');
                const contentLength = videoRes.headers.get('content-length');
                
                if (!contentLength || !videoRes.body) {
                    uiProgress.style.width = '100%';
                    uiPercent.innerText = "Saving...";
                    await cache.put(directUrl, videoRes.clone());
                } else {
                    const total = parseInt(contentLength, 10);
                    let loaded = 0;
                    const reader = videoRes.body.getReader();
                    
                    const stream = new ReadableStream({
                        async start(controller) {
                            while (true) {
                                const {done, value} = await reader.read();
                                if (done) break;
                                loaded += value.length;
                                const percent = Math.round((loaded/total)*100);
                                uiProgress.style.width = percent + '%';
                                uiPercent.innerText = percent + '%';
                                controller.enqueue(value);
                            }
                            controller.close();
                        }
                    });
                    
                    const newResponse = new Response(stream, { headers: videoRes.headers });
                    await cache.put(directUrl, newResponse);
                }
                
                // Step C: File save hone ke baad Database me detail update karo
                let offlineMovies = JSON.parse(localStorage.getItem('my_downloads') || '[]');
                offlineMovies = offlineMovies.filter(m => m.id !== movie.id);
                offlineMovies.push({ id: movie.id, title: movie.title, url: directUrl, thumb: movie.thumb });
                localStorage.setItem('my_downloads', JSON.stringify(offlineMovies));
                
                uiSection.style.display = 'none';
                loadDownloads();
                
            } catch(e) {
                // HINGLISH: Agar fail hoga toh yahan exact error text me print hoga screen par
                console.error("Download Error Details:", e);
                uiStatus.innerText = "Error: " + e.message;
                uiStatus.style.color = "#E63946"; 
                // Error screen pe dikhta rahega taaki aap padh sako (wo turant gayab nahi hoga)
            }
        }

        loadDownloads();
        processPendingDownload();
    </script>
</body>
</html>
